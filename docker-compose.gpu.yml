services:
  engine:
    build:
      args:
        ENGINE_ORT_RUNTIME: gpu
    environment:
      ENGINE_ORT_RUNTIME_FLAVOR: gpu
      ENGINE_ORT_PROVIDERS: ${ENGINE_ORT_PROVIDERS:-CUDAExecutionProvider,CPUExecutionProvider}
      ENGINE_ORT_ALLOW_CPU_FALLBACK: ${ENGINE_ORT_ALLOW_CPU_FALLBACK:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
