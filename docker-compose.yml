services:
  postgres:
    image: postgres:16-alpine
    container_name: bgremover-postgres
    restart: unless-stopped
    profiles: ["local", "dev", "deploy"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bgremover-rabbitmq
    restart: unless-stopped
    profiles: ["local", "dev", "deploy"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-backdroply}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-backdroply_change_me}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  engine:
    build:
      context: ../backdroply-engine
      dockerfile: Dockerfile
      args:
        ENGINE_ORT_RUNTIME: ${ENGINE_ORT_RUNTIME:-cpu}
        ENGINE_ORT_VERSION: ${ENGINE_ORT_VERSION:-1.22.0}
    container_name: bgremover-engine
    restart: unless-stopped
    profiles: ["local", "dev", "deploy"]
    environment:
      ENGINE_PORT: ${ENGINE_PORT}
      ENGINE_WORKDIR: ${ENGINE_WORKDIR}
      ENGINE_ALLOWED_ORIGINS: ${ENGINE_ALLOWED_ORIGINS}
      ENGINE_SHARED_TOKEN: ${ENGINE_SHARED_TOKEN}
      ENGINE_MAX_IMAGE_MB: ${ENGINE_MAX_IMAGE_MB}
      ENGINE_MAX_VIDEO_MB: ${ENGINE_MAX_VIDEO_MB}
      ENGINE_MAX_VIDEO_SECONDS: ${ENGINE_MAX_VIDEO_SECONDS}
      ENGINE_MAX_IMAGE_PIXELS: ${ENGINE_MAX_IMAGE_PIXELS}
      ENGINE_MAX_VIDEO_PIXELS: ${ENGINE_MAX_VIDEO_PIXELS}
      ENGINE_DEFAULT_QUALITY: ${ENGINE_DEFAULT_QUALITY}
      ENGINE_ALLOW_COLOR_BG: ${ENGINE_ALLOW_COLOR_BG}
      ENGINE_KEEP_JOBS_HOURS: ${ENGINE_KEEP_JOBS_HOURS}
      ENGINE_WATERMARK_ENABLED: ${ENGINE_WATERMARK_ENABLED:-true}
      ENGINE_WATERMARK_TEXT: ${ENGINE_WATERMARK_TEXT:-Made by Fatih}
      ENGINE_MODEL_CANDIDATES_ULTRA: ${ENGINE_MODEL_CANDIDATES_ULTRA:-u2netp}
      ENGINE_MODEL_CANDIDATES_BALANCED: ${ENGINE_MODEL_CANDIDATES_BALANCED:-u2netp}
      ENGINE_ULTRA_MAX_PASSES: ${ENGINE_ULTRA_MAX_PASSES:-5}
      ENGINE_TEMPORAL_FLOW_STRENGTH: ${ENGINE_TEMPORAL_FLOW_STRENGTH:-0.22}
      ENGINE_EDGE_REFINE_STRENGTH: ${ENGINE_EDGE_REFINE_STRENGTH:-0.7}
      ENGINE_ENABLE_FRAME_RECHECK: ${ENGINE_ENABLE_FRAME_RECHECK:-true}
      ENGINE_RECHECK_EDGE_THRESHOLD: ${ENGINE_RECHECK_EDGE_THRESHOLD:-9.0}
      ENGINE_RECHECK_DISAGREEMENT_THRESHOLD: ${ENGINE_RECHECK_DISAGREEMENT_THRESHOLD:-28.0}
      ENGINE_MAX_CONCURRENT_JOBS: ${ENGINE_MAX_CONCURRENT_JOBS:-2}
      ENGINE_QUEUE_WAIT_SECONDS: ${ENGINE_QUEUE_WAIT_SECONDS:-2.0}
      ENGINE_PREWARM_ON_STARTUP: ${ENGINE_PREWARM_ON_STARTUP:-true}
      ENGINE_PREWARM_QUALITY: ${ENGINE_PREWARM_QUALITY:-ultra}
      ENGINE_ORT_PROVIDERS: ${ENGINE_ORT_PROVIDERS:-}
      ENGINE_ORT_ALLOW_CPU_FALLBACK: ${ENGINE_ORT_ALLOW_CPU_FALLBACK:-true}
      ENGINE_ORT_RUNTIME_FLAVOR: ${ENGINE_ORT_RUNTIME_FLAVOR:-cpu}
      ENGINE_UVICORN_WORKERS: ${ENGINE_UVICORN_WORKERS:-}
      ENGINE_UVICORN_LIMIT_CONCURRENCY: ${ENGINE_UVICORN_LIMIT_CONCURRENCY:-}
      U2NET_HOME: ${U2NET_HOME:-/app/data/u2net}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
    volumes:
      - enginedata:/app/data
    ports:
      - "${ENGINE_PORT:-9000}:9000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:9000/health', timeout=3).status == 200 else sys.exit(1)"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ../backdroply-backend
      dockerfile: Dockerfile
    container_name: bgremover-backend
    restart: unless-stopped
    profiles: ["local", "dev", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      engine:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_PORT}
      SPRING_PROFILES_ACTIVE: docker
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${BACKEND_JWT_SECRET}
      APP_JWT_EXPIRES_MIN: ${BACKEND_JWT_EXPIRES_MIN}
      APP_ALLOWED_ORIGIN: ${BACKEND_ALLOWED_ORIGIN}
      APP_STRICT_STARTUP: ${APP_STRICT_STARTUP:-false}
      APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      APP_ENGINE_BASE_URL: ${ENGINE_BASE_URL}
      APP_ENGINE_SHARED_TOKEN: ${ENGINE_SHARED_TOKEN}
      APP_ENGINE_PROCESS_TIMEOUT_SEC: ${APP_ENGINE_PROCESS_TIMEOUT_SEC:-900}
      APP_ENGINE_PREWARM_ON_STARTUP: ${APP_ENGINE_PREWARM_ON_STARTUP:-false}
      APP_ENGINE_PREWARM_QUALITY: ${APP_ENGINE_PREWARM_QUALITY:-ultra}
      APP_DEFAULT_USER_TOKENS: ${DEFAULT_USER_TOKENS}
      APP_TOKEN_COST_BALANCED: ${TOKEN_COST_BALANCED}
      APP_TOKEN_COST_ULTRA: ${TOKEN_COST_ULTRA}
      APP_STALE_JOB_REFUND_MINUTES: ${STALE_JOB_REFUND_MINUTES:-30}
      APP_MAX_IN_FLIGHT_PROCESS_JOBS: ${APP_MAX_IN_FLIGHT_PROCESS_JOBS:-64}
      APP_IN_FLIGHT_ACQUIRE_TIMEOUT_MS: ${APP_IN_FLIGHT_ACQUIRE_TIMEOUT_MS:-250}
      APP_MAIL_FROM: ${MAIL_FROM}
      APP_STORAGE_ENABLED: ${STORAGE_ENABLED}
      APP_STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      APP_STORAGE_BUCKET: ${STORAGE_BUCKET}
      APP_STORAGE_REGION: ${STORAGE_REGION}
      APP_STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      APP_STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      APP_STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      APP_STORAGE_PATH_STYLE: ${STORAGE_PATH_STYLE}
      APP_STORAGE_AUTO_CREATE_BUCKET: ${STORAGE_AUTO_CREATE_BUCKET:-true}
      APP_STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL}
      APP_STORAGE_SSE_ENABLED: ${STORAGE_SSE_ENABLED:-false}
      APP_STORAGE_SSE_MODE: ${STORAGE_SSE_MODE:-AES256}
      APP_STORAGE_SSE_KMS_KEY_ID: ${STORAGE_SSE_KMS_KEY_ID:-}
      APP_PRIVACY_DELETION_PEPPER: ${PRIVACY_DELETION_PEPPER}
      APP_PRIVACY_PII_KEY: ${PRIVACY_PII_KEY:-}
      SPRING_MAIL_HOST: ${SMTP_HOST}
      SPRING_MAIL_PORT: ${SMTP_PORT}
      SPRING_MAIL_USERNAME: ${SMTP_USER}
      SPRING_MAIL_PASSWORD: ${SMTP_PASS}
      APP_PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      APP_PAYMENT_WEBHOOK_TOLERANCE_SEC: ${PAYMENT_WEBHOOK_TOLERANCE_SEC}
      APP_PAYMENT_PROVIDER_NAME: ${PAYMENT_PROVIDER_NAME}
      APP_PAYMENT_PROVIDER_BASE_URL: ${PAYMENT_PROVIDER_BASE_URL}
      APP_PAYMENT_PROVIDER_API_KEY: ${PAYMENT_PROVIDER_API_KEY}
      APP_PAYMENT_PROVIDER_SECRET_KEY: ${PAYMENT_PROVIDER_SECRET_KEY}
      APP_PAYMENT_WEBHOOK_LOG_RETENTION_DAYS: ${PAYMENT_WEBHOOK_LOG_RETENTION_DAYS:-45}
      APP_SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@backdroply.app}
      APP_SUPPORT_KVKK_EMAIL: ${SUPPORT_KVKK_EMAIL:-kvkk@backdroply.app}
      APP_SUPPORT_PHONE: ${SUPPORT_PHONE:-}
      APP_SUPPORT_KEP: ${SUPPORT_KEP:-}
      APP_SUPPORT_RESPONSE_SLA_HOURS: ${SUPPORT_RESPONSE_SLA_HOURS:-48}
      APP_SUPPORT_DATA_DELETION_URL: ${SUPPORT_DATA_DELETION_URL:-/legal/privacy.html}
      APP_PLAN_STARTER_MONTHLY_CODE: ${PLAN_STARTER_MONTHLY_CODE:-starter_monthly}
      APP_PLAN_STARTER_MONTHLY_LABEL_TR: ${PLAN_STARTER_MONTHLY_LABEL_TR:-Başlangıç Aylık}
      APP_PLAN_STARTER_MONTHLY_LABEL_EN: ${PLAN_STARTER_MONTHLY_LABEL_EN:-Starter Monthly}
      APP_PLAN_STARTER_MONTHLY_TOKENS: ${PLAN_STARTER_MONTHLY_TOKENS:-120}
      APP_PLAN_STARTER_MONTHLY_PRICE_TRY: ${PLAN_STARTER_MONTHLY_PRICE_TRY:-149.00}
      APP_PLAN_STARTER_MONTHLY_DURATION_DAYS: ${PLAN_STARTER_MONTHLY_DURATION_DAYS:-31}
      APP_PLAN_STARTER_MONTHLY_WATERMARK_FREE: ${PLAN_STARTER_MONTHLY_WATERMARK_FREE:-false}
      APP_PLAN_STARTER_MONTHLY_POPULAR: ${PLAN_STARTER_MONTHLY_POPULAR:-false}
      APP_PLAN_PRO_MONTHLY_CODE: ${PLAN_PRO_MONTHLY_CODE:-pro_monthly}
      APP_PLAN_PRO_MONTHLY_LABEL_TR: ${PLAN_PRO_MONTHLY_LABEL_TR:-Pro Aylık}
      APP_PLAN_PRO_MONTHLY_LABEL_EN: ${PLAN_PRO_MONTHLY_LABEL_EN:-Pro Monthly}
      APP_PLAN_PRO_MONTHLY_TOKENS: ${PLAN_PRO_MONTHLY_TOKENS:-380}
      APP_PLAN_PRO_MONTHLY_PRICE_TRY: ${PLAN_PRO_MONTHLY_PRICE_TRY:-349.00}
      APP_PLAN_PRO_MONTHLY_DURATION_DAYS: ${PLAN_PRO_MONTHLY_DURATION_DAYS:-31}
      APP_PLAN_PRO_MONTHLY_WATERMARK_FREE: ${PLAN_PRO_MONTHLY_WATERMARK_FREE:-true}
      APP_PLAN_PRO_MONTHLY_POPULAR: ${PLAN_PRO_MONTHLY_POPULAR:-true}
      APP_PLAN_PRO_YEARLY_CODE: ${PLAN_PRO_YEARLY_CODE:-pro_yearly}
      APP_PLAN_PRO_YEARLY_LABEL_TR: ${PLAN_PRO_YEARLY_LABEL_TR:-Pro Yıllık}
      APP_PLAN_PRO_YEARLY_LABEL_EN: ${PLAN_PRO_YEARLY_LABEL_EN:-Pro Yearly}
      APP_PLAN_PRO_YEARLY_TOKENS: ${PLAN_PRO_YEARLY_TOKENS:-5000}
      APP_PLAN_PRO_YEARLY_PRICE_TRY: ${PLAN_PRO_YEARLY_PRICE_TRY:-2990.00}
      APP_PLAN_PRO_YEARLY_DURATION_DAYS: ${PLAN_PRO_YEARLY_DURATION_DAYS:-365}
      APP_PLAN_PRO_YEARLY_WATERMARK_FREE: ${PLAN_PRO_YEARLY_WATERMARK_FREE:-true}
      APP_PLAN_PRO_YEARLY_POPULAR: ${PLAN_PRO_YEARLY_POPULAR:-false}
      APP_AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      APP_AUTH_COOKIE_SECURE_AUTO: ${AUTH_COOKIE_SECURE_AUTO:-true}
      APP_AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      APP_AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      APP_RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-24}
      APP_RATE_LIMIT_PROCESS_PER_MINUTE: ${RATE_LIMIT_PROCESS_PER_MINUTE:-16}
      APP_RATE_LIMIT_FRAME_EXTRACT_PER_MINUTE: ${RATE_LIMIT_FRAME_EXTRACT_PER_MINUTE:-36}
      APP_RATE_LIMIT_WEBHOOK_PER_MINUTE: ${RATE_LIMIT_WEBHOOK_PER_MINUTE:-120}
      APP_RATE_LIMIT_TRUST_FORWARDED_FOR: ${RATE_LIMIT_TRUST_FORWARDED_FOR:-false}
      APP_UPLOAD_MAX_IMAGE_MB: ${APP_UPLOAD_MAX_IMAGE_MB:-${ENGINE_MAX_IMAGE_MB}}
      APP_UPLOAD_MAX_VIDEO_MB: ${APP_UPLOAD_MAX_VIDEO_MB:-${ENGINE_MAX_VIDEO_MB}}
      APP_UPLOAD_SNIFF_BYTES: ${APP_UPLOAD_SNIFF_BYTES:-4096}
      APP_UPLOAD_STRICT_MAGIC: ${APP_UPLOAD_STRICT_MAGIC:-true}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-backdroply}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-backdroply_change_me}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      APP_QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
      APP_QUEUE_NAME: ${QUEUE_NAME:-media.jobs.queue}
      APP_QUEUE_EXCHANGE: ${QUEUE_EXCHANGE:-media.jobs.exchange}
      APP_QUEUE_ROUTING_KEY: ${QUEUE_ROUTING_KEY:-media.jobs.submit}
      APP_QUEUE_PREFETCH: ${QUEUE_PREFETCH:-1}
      APP_QUEUE_CONSUMERS: ${QUEUE_CONSUMERS:-2}
      APP_QUEUE_MAX_DEPTH: ${QUEUE_MAX_DEPTH:-500}
      APP_QUEUE_ETA_SECONDS_IMAGE: ${QUEUE_ETA_SECONDS_IMAGE:-12}
      APP_QUEUE_ETA_SECONDS_VIDEO: ${QUEUE_ETA_SECONDS_VIDEO:-45}
      APP_RATE_LIMIT_STATUS_PER_MINUTE: ${RATE_LIMIT_STATUS_PER_MINUTE:-120}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: bgremover-minio
    restart: unless-stopped
    profiles: ["local", "dev", "deploy"]
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    ports:
      - "9010:9000"
      - "9011:9001"

  web-dev:
    build:
      context: ../backdroply-web
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_SITE_URL: ${VITE_SITE_URL}
    container_name: bgremover-web-dev
    restart: unless-stopped
    profiles: ["local", "dev"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_SITE_URL: ${VITE_SITE_URL}
    ports:
      - "${WEB_PORT:-5173}:5173"

  web-prod:
    build:
      context: ../backdroply-web
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_SITE_URL: ${VITE_SITE_URL}
    container_name: bgremover-web-prod
    restart: unless-stopped
    profiles: ["deploy"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8081}:80"

volumes:
  pgdata:
  enginedata:
  miniodata:
  rabbitmqdata:
